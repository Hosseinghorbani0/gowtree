name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Run tests
        run: go test ./...
      - name: Build Windows binary
        run: go build -ldflags="-s -w" -o gowtree.exe ./cmd/gowtree

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build release binary
        run: go build -ldflags="-s -w" -o gowtree.exe ./cmd/gowtree
      - name: Install Inno Setup
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/DIR=C:\InnoSetup6" -Wait
      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/build-installer.ps1
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/gowtree.exe
            release/gowtree-setup-1.4.0.exe
            release/gowtree-portable-1.4.0.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
